[pytest]
# Pytest configuration for multi-provider-router

# Test discovery patterns
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Test paths
testpaths = tests

# Output options
addopts =
    -v
    --strict-markers
    --tb=short
    --disable-warnings
    --cov=multi_provider_router
    --cov-report=term-missing
    --cov-report=html:htmlcov
    --cov-report=xml:coverage.xml
    --asyncio-mode=auto

# Markers for categorizing tests
markers =
    unit: Unit tests (fast, isolated)
    integration: Integration tests (slower, may use external services)
    slow: Slow-running tests
    async: Async tests
    providers: Tests for provider implementations
    routing: Tests for routing and load balancing
    fallback: Tests for fallback and circuit breaker
    cache: Tests for caching system
    rate_limiter: Tests for rate limiting
    health: Tests for health checking
    metrics: Tests for metrics collection

# Coverage options
[coverage:run]
source = multi_provider_router
omit =
    */tests/*
    */test_*.py
    */__pycache__/*
    */site-packages/*
    */dist-packages/*
    setup.py

[coverage:report]
precision = 2
show_missing = True
skip_covered = False

exclude_lines =
    pragma: no cover
    def __repr__
    raise AssertionError
    raise NotImplementedError
    if __name__ == .__main__.:
    if TYPE_CHECKING:
    @abstractmethod
