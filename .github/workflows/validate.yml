name: Validate Package

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate-structure:
    name: Validate package structure
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install validation dependencies
        run: |
          python -m pip install --upgrade pip
          pip install check-manifest pyroma

      - name: Check package structure
        run: |
          python -c "
          import os
          import sys

          required_files = [
              'README.md',
              'LICENSE',
              'pyproject.toml',
              'setup.py',
              'MANIFEST.in',
              'multi_provider_router/__init__.py',
          ]

          missing = []
          for file in required_files:
              if not os.path.exists(file):
                  missing.append(file)

          if missing:
              print(f'Missing required files: {missing}')
              sys.exit(1)
          else:
              print('All required files present!')
          "

      - name: Validate MANIFEST.in
        run: |
          check-manifest -v || true

      - name: Validate package quality
        run: |
          pyroma . || true

      - name: Check setup.py validity
        run: |
          python setup.py check

      - name: Validate metadata
        run: |
          python -c "
          from setuptools.config.pyprojecttoml import read_configuration
          import sys

          try:
              config = read_configuration('pyproject.toml')
              project = config.get('project', {})

              # Check required fields
              required_fields = ['name', 'version', 'description', 'requires-python']
              missing = [f for f in required_fields if not project.get(f)]

              if missing:
                  print(f'Missing required metadata fields: {missing}')
                  sys.exit(1)

              # Validate version format
              version = project.get('version', '')
              if not version:
                  print('Version is empty!')
                  sys.exit(1)

              print('Package metadata is valid!')
              print(f'Name: {project.get(\"name\")}')
              print(f'Version: {version}')
              print(f'Description: {project.get(\"description\", \"N/A\")[:50]}...')

          except Exception as e:
              print(f'Error reading pyproject.toml: {e}')
              sys.exit(1)
          "

  validate-installation:
    name: Validate installation
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ['3.10', '3.12']

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install package
        run: |
          python -m pip install --upgrade pip
          pip install -e .

      - name: Verify installation
        run: |
          python -c "
          from multi_provider_router import MultiProviderRouter
          print('Package installed successfully!')
          "

      - name: Check package contents
        run: |
          python -c "
          import pkgutil
          import multi_provider_router

          # List all modules
          modules = []
          for importer, modname, ispkg in pkgutil.walk_packages(
              path=multi_provider_router.__path__,
              prefix=multi_provider_router.__name__ + '.',
              onerror=lambda x: None
          ):
              modules.append(modname)

          print(f'Found {len(modules)} modules:')
          for module in sorted(modules)[:10]:
              print(f'  - {module}')

          if len(modules) > 10:
              print(f'  ... and {len(modules) - 10} more')
          "

      - name: Test basic import
        run: |
          python -c "
          from multi_provider_router import MultiProviderRouter
          from multi_provider_router.core.router import Router
          print('All core imports successful!')
          "

  validate-examples:
    name: Validate examples
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install package
        run: |
          python -m pip install --upgrade pip
          pip install -e .

      - name: Find example files
        id: find_examples
        run: |
          if [ -d examples ]; then
            EXAMPLES=$(find examples -name "*.py" -type f | wc -l)
            echo "count=$EXAMPLES" >> $GITHUB_OUTPUT
            echo "Found $EXAMPLES example files"
          else
            echo "count=0" >> $GITHUB_OUTPUT
            echo "No examples directory found"
          fi

      - name: Run basic example validation
        if: steps.find_examples.outputs.count > 0
        run: |
          python -c "
          import ast
          import os
          from pathlib import Path

          examples_dir = Path('examples')
          issues = []

          for example_file in examples_dir.glob('**/*.py'):
              try:
                  with open(example_file, 'r') as f:
                      ast.parse(f.read())
                  print(f'✓ {example_file}: Valid Python')
              except SyntaxError as e:
                  issues.append(f'{example_file}: {e}')
                  print(f'✗ {example_file}: Syntax error')

          if issues:
              print('\\nIssues found:')
              for issue in issues:
                  print(f'  - {issue}')
          else:
              print('\\nAll examples have valid syntax!')
          "

      - name: Test example imports
        run: |
          python -c "
          from multi_provider_router import MultiProviderRouter
          print('Package can be imported in examples context!')
          "

  validate-dependencies:
    name: Validate dependencies
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install package
        run: |
          python -m pip install --upgrade pip
          pip install -e .

      - name: Check for dependency conflicts
        run: |
          pip check

      - name: List installed packages
        run: |
          pip list

      - name: Validate dependency versions
        run: |
          python -c "
          import sys
          import pkg_resources

          print('Python version:', sys.version)
          print('\\nInstalled dependencies:')

          for dist in pkg_resources.working_set:
              if dist.project_name.lower() in ['fastapi', 'uvicorn', 'pydantic']:
                  print(f'  {dist.project_name}: {dist.version}')
          "
